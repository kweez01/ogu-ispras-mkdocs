site_name: ИСП РАН + ОГУ
site_url: https://kweez01.github.io/ogu-ispras-mkdocs/

theme:
  name: material
  language: ru
  logo: ISP_logo_RU.png
  font: false
  palette:
    scheme: default
  features:
    - navigation.top
    - navigation.instant
    - navigation.expand
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search:
      lang: ru
  - macros
  - glightbox

nav:
  - Главная: index.md

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - md_in_html
  - toc:
      permalink: "¶"